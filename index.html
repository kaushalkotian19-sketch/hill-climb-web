<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hill Climb Web</title>
    
    <style>
        /* Reset margins and prevent scrolling */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #87CEEB; touch-action: none; }
        #game-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { display: block; }
        
        /* UI Overlays */
        #score-display { position: absolute; top: 20px; left: 20px; color: #FFD700; font-size: 28px; font-weight: bold; font-family: sans-serif; text-shadow: 2px 2px 0 #000; z-index: 10; }
        #bank-display { position: absolute; top: 60px; left: 20px; color: #ffffff; font-size: 20px; font-weight: bold; font-family: sans-serif; text-shadow: 2px 2px 0px #000; z-index: 10; }
        #fuel-container { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 200px; height: 25px; background-color: rgba(0, 0, 0, 0.7); border: 3px solid white; border-radius: 10px; z-index: 10; overflow: hidden; }
        #fuel-bar { width: 100%; height: 100%; background-color: #00ff00; transition: width 0.1s linear, background-color 0.3s; }
        
        /* Mobile Controls */
        #ui-layer { position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; z-index: 10; }
        button { pointer-events: auto; background-color: rgba(0, 0, 0, 0.5); color: white; border: 2px solid white; border-radius: 50%; width: 80px; height: 80px; font-size: 16px; font-weight: bold; user-select: none; -webkit-user-select: none; }
        button:active { background-color: rgba(255, 0, 0, 0.7); }
        
        /* Game Over Screen */
        #game-over-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; color: white; font-family: sans-serif; text-align: center; }
        #game-over-title { color: #ff4444; font-size: 48px; margin-bottom: 10px; text-transform: uppercase; text-shadow: 2px 2px 0px #000; }
        #final-score-text { font-size: 24px; color: #FFD700; margin-bottom: 30px; }
        #btn-restart { background-color: #28a745; padding: 15px 40px; font-size: 24px; border-radius: 10px; width: auto; height: auto; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <div id="score-display">Coins: 0</div>
    <div id="bank-display">Bank: 0</div>

    <div id="fuel-container">
        <div id="fuel-bar"></div>
    </div>

    <div id="ui-layer">
        <button id="btn-brake">BRAKE</button>
        <button id="btn-gas">GAS</button>
    </div>

    <div id="game-over-screen" style="display: none;">
        <h1 id="game-over-title">CRASHED!</h1>
        <p id="final-score-text">Final Coins: 0</p>
        <button id="btn-restart">TRY AGAIN</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

    <script src="js/main.js"></script>

    <script src="js/database.js"></script> 
    <script src="js/terrain.js"></script>
    <script src="js/vehicle.js"></script>
    <script src="js/ui.js"></script>

</body>
</html>
