<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hill Climb Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="game-container"></div>

    <div id="score-display">Coins: 0</div>
    <div id="bank-display">Bank: 0</div>

    <div id="fuel-container">
        <div id="fuel-bar"></div>
    </div>

    <div id="ui-layer">
        <button id="btn-brake">BRAKE</button>
        <button id="btn-gas">GAS</button>
    </div>

    <div id="main-menu">
        <h1 id="game-title">HILL CLIMB WEB</h1>
        <div id="menu-bank-display">Total Bank: 0</div>
        
        <h2>SELECT VEHICLE</h2>
        <div class="vehicle-selection">
            <button id="btn-start-jeep" class="menu-btn">
                DRIVE JEEP
            </button>
            <button id="btn-start-monster" class="menu-btn">
                UNLOCK MONSTER TRUCK (200)
            </button>
        </div>
    </div>

    <div id="game-over-screen" style="display: none;">
        <h1 id="game-over-title">CRASHED!</h1>
        <p id="final-score-text">Final Coins: 0</p>
        <button id="btn-restart">TRY AGAIN</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

    <script src="js/main.js"></script>
    <script src="js/database.js"></script> 
    <script src="js/terrain.js"></script>
    <script src="js/vehicle.js"></script>
    <script src="js/ui.js"></script>

</body>
</html>
